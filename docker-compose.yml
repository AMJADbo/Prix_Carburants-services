services:

  # ── Base de données MySQL ──────────────────────────────────
  db:
    image: mysql:8.0
    container_name: carburants-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: carburants
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ── Application Tomcat ────────────────────────────────────
  app:
    build: .
    container_name: carburants-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: db
      DB_URL: jdbc:mysql://db:3306/carburants?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Paris
      DB_USER: root
      DB_PASS: root
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: